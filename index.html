<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cruzadinha Tech</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- LOGO -->
        <div class="logo">
            <img src="./img/logo.png" alt="Logo">
        </div>

        <!-- TITULO -->
        <h1 id="titulo">🧠 Cruzadinha Tech</h1>

        <p class="subtitulo">
            Aprenda tecnologia se divertindo 🚀
        </p>

        <!-- STATUS -->
        <div class="status-box">

            <div>
                🏆 Pontos:
                <span id="pontos">0</span>
            </div>

            <div>
                ❤️ Vidas:
                <span id="vidas">3</span>
            </div>

        </div>

        <!-- TABELA -->
        <div class="game-box">

            <table>

                <tr>
                    <td class="palavra1">C</td>
                    <td class="palavra1">P</td>
                    <td class="palavra1">U</td>
                </tr>

                <tr>
                    <td class="palavra2">R</td>
                    <td class="palavra2">A</td>
                    <td class="palavra2">M</td>
                </tr>

                <tr>
                    <td class="palavra3">S</td>
                    <td class="palavra3">S</td>
                    <td class="palavra3">D</td>
                </tr>

                <tr>
                    <td class="palavra4">W</td>
                    <td class="palavra4">I</td>
                    <td class="palavra4">F</td>
                    <td class="palavra4">I</td>
                </tr>

                <tr>
                    <td class="palavra5">M</td>
                    <td class="palavra5">O</td>
                    <td class="palavra5">U</td>
                    <td class="palavra5">S</td>
                    <td class="palavra5">E</td>
                </tr>

                <tr>
                    <td class="palavra6">L</td>
                    <td class="palavra6">I</td>
                    <td class="palavra6">N</td>
                    <td class="palavra6">U</td>
                    <td class="palavra6">X</td>
                </tr>

                <tr>
                    <td class="palavra7">J</td>
                    <td class="palavra7">A</td>
                    <td class="palavra7">V</td>
                    <td class="palavra7">A</td>
                </tr>

                <tr>
                    <td class="palavra8">C</td>
                    <td class="palavra8">L</td>
                    <td class="palavra8">O</td>
                    <td class="palavra8">U</td>
                    <td class="palavra8">D</td>
                </tr>

            </table>

        </div>

        <!-- FORMULARIO -->
        <div class="formulario">

            <h2 id="pergunta"></h2>

            <input
                type="text"
                id="resposta"
                placeholder="Digite sua resposta..."
            >

            <button id="btnEnviar">
                Enviar
            </button>

            <div id="mensagem"></div>

            <!-- BARRA -->
            <div class="progresso">
                <div id="barra"></div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
